[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 1000000
via_ir = false

[profile.default.fuzz]
runs = 10000

[profile.default.invariant]
runs = 1000
depth = 100

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC}"
mainnet = "${MAINNET_RPC}"
reactive_kopli = "${REACTIVE_KOPLI_RPC}"
